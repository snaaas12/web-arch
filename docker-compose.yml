services:
  php:
    image: ghcr.io/${GITHUB_REPOSITORY:-local/boardy}-php:latest
    volumes:
      - ./boardy-laravel:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - boardy-network

  fastapi:
    image: ghcr.io/${GITHUB_REPOSITORY:-local/boardy}-api:latest
    volumes:
      - ./boardy-api:/app
    depends_on:
      - mysql
      - redis
    networks:
      - boardy-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./boardy-laravel/public:/var/www/html/public:ro
    depends_on:
      - php
      - fastapi
    networks:
      - boardy-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-boardy}
      MYSQL_USER: ${DB_USERNAME:-boardy_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-boardy_password}
    volumes:
      - db-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - boardy-network

  redis:
    image: redis:7-alpine
    networks:
      - boardy-network

volumes:
  db-data:

networks:
  boardy-network:
    driver: bridge

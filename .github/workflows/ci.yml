name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: PHP syntax check
        run: |
          find boardy-laravel -name "*.php" -print0 | \
          xargs -0 -n1 php -l
          
      - name: Python syntax check
        run: |
          python -m compileall boardy-api/ -q

    smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    
    - name: Create .env file
      run: |
        cat > .env << 'ENVEOF'
        DB_ROOT_PASSWORD=rootpassword
        DB_DATABASE=boardy
        DB_USERNAME=boardy_user
        DB_PASSWORD=boardy_password
        GITHUB_REPOSITORY=local/boardy
        ENVEOF
        sed -i 's/^[[:space:]]*//' .env
    
    - name: Check nginx config exists
      run: |
        ls -la docker/nginx/
        cat docker/nginx/nginx.conf
    
    - name: Build images
      run: docker compose -f docker-compose.yml -f docker-compose.local.yml build
    
    - name: Start stack
      run: |
        docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
        sleep 15
    
    - name: Check all containers
      run: |
        echo "=== Container Status ==="
        docker compose -f docker-compose.yml -f docker-compose.local.yml ps
        
        echo -e "\n=== All Docker Containers ==="
        docker ps -a
        
        echo -e "\n=== Nginx Logs ==="
        docker compose -f docker-compose.yml -f docker-compose.local.yml logs nginx
        
        echo -e "\n=== PHP Logs ==="
        docker compose -f docker-compose.yml -f docker-compose.local.yml logs php
        
        echo -e "\n=== FastAPI Logs ==="
        docker compose -f docker-compose.yml -f docker-compose.local.yml logs fastapi
        
        echo -e "\n=== MySQL Logs ==="
        docker compose -f docker-compose.yml -f docker-compose.local.yml logs mysql
    
    - name: Check nginx config inside container
      run: |
        docker compose -f docker-compose.yml -f docker-compose.local.yml exec -T nginx nginx -t || true
        docker compose -f docker-compose.yml -f docker-compose.local.yml exec -T nginx cat /etc/nginx/nginx.conf || true
    
    - name: Check ports
      run: |
        netstat -tlnp || ss -tlnp
        docker port $(docker compose -f docker-compose.yml -f docker-compose.local.yml ps -q nginx)
    
    - name: Wait for services
      run: |
        for i in {1..30}; do
          if curl -fs http://localhost/health; then
            echo "Service is ready!"
            break
          fi
          echo "Waiting... attempt $i"
          sleep 2
        done
    
    - name: Smoke endpoints
      run: |
        curl -f http://localhost/health
        curl -f http://localhost/api/health
    
    - name: Tear down
      if: always()
      run: docker compose -f docker-compose.yml -f docker-compose.local.yml down -v

   test:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          
      - name: Install PHP deps
        working-directory: ./boardy-laravel
        run: composer install --no-interaction --prefer-dist
        
      - name: Run PHPUnit
        working-directory: ./boardy-laravel
        run: php artisan test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python deps
        run: pip install -r boardy-api/requirements.txt pytest httpx
        
      - name: Run pytest
        working-directory: ./boardy-api
        run: pytest -v

name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # === ПРОВЕРКИ (копия из ci.yml) ===
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP syntax check
        run: |
          find boardy-laravel -name "*.php" -print0 | \
          xargs -0 -n1 php -l 2>&1 | grep -v "No syntax errors" || true
      - name: Python syntax check
        run: python -m compileall boardy-api/ -q

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
      - name: Start stack
        run: |
          docker compose up -d
          for i in {1..30}; do
            curl -fs http://localhost/health && break
            sleep 2
          done
      - name: Smoke endpoints
        run: |
          curl -f http://localhost/health
          curl -f http://localhost/api/health
      - name: Tear down
        if: always()
        run: docker compose down -v

  test:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install PHP deps
        working-directory: ./boardy-laravel
        run: composer install --no-interaction --prefer-dist
      - name: Run PHPUnit
        working-directory: ./boardy-laravel
        run: php artisan test
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install -r boardy-api/requirements.txt pytest httpx
      - name: Run pytest
        working-directory: ./boardy-api
        run: pytest tests/ -v

  # === СБОРКА И ПУШ ОБРАЗОВ ===
  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build & push Laravel image
        uses: docker/build-push-action@v5
        with:
          context: ./boardy-laravel
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-laravel:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-laravel:latest
            
      - name: Build & push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: ./boardy-api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api:latest

  # === ДЕПЛОЙ НА СЕРВЕР ===
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/boardy
            echo ${{ secrets.GITHUB_TOKEN }} | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f

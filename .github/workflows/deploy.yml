name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP syntax check
        run: |
          find boardy-laravel -name "*.php" -print0 | \
          xargs -0 -n1 php -l

      - name: Python syntax check
        run: |
          python -m compileall boardy-api/ -q

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          DB_ROOT_PASSWORD=rootpassword
          DB_DATABASE=boardy
          DB_USERNAME=boardy_user
          DB_PASSWORD=boardy_password
          GITHUB_REPOSITORY=local/boardy
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Build images
        run: docker compose -f docker-compose.yml -f docker-compose.local.yml build

      - name: Start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
          sleep 15

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost/health; then
              echo "Service is ready!"
              break
            fi
            echo "Waiting... attempt $i"
            sleep 2
          done

      - name: Smoke endpoints
        run: |
          curl -f http://localhost/health
          curl -f http://localhost/api/health

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.local.yml down -v

  test:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      # --- PHP/Laravel ňĺńňű ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install PHP deps
        working-directory: ./boardy-laravel
        run: composer install --no-interaction --prefer-dist

      - name: Setup Laravel env
        working-directory: ./boardy-laravel
        run: |
          cp .env.example .env || touch .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run HealthTest only
        working-directory: ./boardy-laravel
        run: ./vendor/bin/phpunit tests/Feature/healthTest.php

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r boardy-api/requirements.txt pytest "httpx<0.28"

      - name: Run pytest
        working-directory: ./boardy-api
        run: pytest -v

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push PHP image
        uses: docker/build-push-action@v5
        with:
          context: ./boardy-laravel
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/boardy-laravel:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/boardy-laravel:latest

      - name: Build & push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: ./boardy-api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/boardy-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/boardy-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/boardy
            echo ${{ secrets.GHCR_PAT }} | \
              docker login ghcr.io -u snaaas12 --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker logout ghcr.io
